apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-data-analyzer-frontend
  labels:
    app: ai-data-analyzer
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-data-analyzer
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-data-analyzer
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ai-data-analyzer-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3000'
            - name: NEXT_PUBLIC_API_URL
              value: http://ai-data-analyzer-backend:3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

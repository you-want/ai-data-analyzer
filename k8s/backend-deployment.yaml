apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-data-analyzer-backend
  labels:
    app: ai-data-analyzer
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-data-analyzer
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-data-analyzer
        component: backend
    spec:
      containers:
        - name: backend
          image: ai-data-analyzer-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3001'
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: REDIS_HOST
              value: redis-master
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/deep
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5

# Kubernetes Secrets 配置
# 注意：生产环境中请使用以下命令生成 base64 编码的值：
#   echo -n "your-value" | base64
#
# 示例：
#   echo -n "postgres-host" | base64  -> cG9zdGdyZXMtaG9zdA==
#   echo -n "strong-password-123" | base64  -> c3Ryb25nLXBhc3N3b3JkLTEyMw==

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
data:
  # TODO: 替换为真实的 base64 编码值
  # 使用: echo -n "your-db-host" | base64
  host: cG9zdGdyZXNxbC1tYXN0ZXI=
  # TODO: 替换为真实的 base64 编码用户名
  user: YWRtaW4=
  # TODO: 替换为强密码（至少 16 位，包含大小写字母、数字和特殊字符）
  password: cGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
type: Opaque
data:
  # TODO: 替换为强 Redis 密码
  password: cmVkaXMtcGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
type: Opaque
data:
  # TODO: 替换为强 JWT 密钥（至少 32 个字符）
  secret: eW91ci1qd3Qtc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9u
---
apiVersion: v1
kind: Secret
metadata:
  name: encryption-secret
type: Opaque
data:
  # TODO: 替换为 32 字符的 AES-256 加密密钥
  key: bXktMzItY2hhcmFjdGVyLWVuY3J5cHRpb24ta2V5LTEyMzQ1

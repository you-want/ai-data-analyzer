apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-data-analyzer-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '50m'
spec:
  tls:
    - hosts:
        - api.example.com
        - app.example.com
      secretName: ai-data-analyzer-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-data-analyzer-backend
                port:
                  number: 3001
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-data-analyzer-frontend
                port:
                  number: 3000
